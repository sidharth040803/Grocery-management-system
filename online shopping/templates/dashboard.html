<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalnia&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Rubik+Scribble&display=swap" rel="stylesheet">
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
     body{
        overflow: scroll;
        
     }
     img.first{
     width: 180px;
     height: 180px;
     object-fit: cover;
     border-radius: 100%;
     padding: 20px;
     }
     
    .row1{
        margin-left: 20px;
        height: 220px;
        width:100%;
    }
    .row2{
        margin-left: 20px;
        height: 220px;
        width:100%;
    }
    button {
  background-color: #04AA6D;
  width:200px;
  border: none;
  color: white;
  padding: 15px 20px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 20px;
  font-family: "DM Serif Display";
  margin: 4px 40px;
  cursor: pointer;
  transition: all 1000ms;
  position: relative;
  overflow: hidden;
  border-radius: 15px;
   }
   button:hover {
  color: #ffffff;
  transform: scale(1.1);
  
}
button::before {
  content: "";
  position: absolute;
  left: -50px;
  top: 0;
  width: 0;
  height: 100%;
  background-color: #7be96d;
  transform: skewX(45deg);
  z-index: -1;
  transition: width 1000ms;
}

button:hover::before {
  width: 250%;
}
   .first{
    margin-left: 60px;
    
   }
   .last{
    margin-left: 60px;
    
   }
  

#head{
 
    height:100px;
    color: rgb(13, 165, 28);
    font-size: 70px;
    text-align: center;
    
    font-family: "Kalnia";
}

</style>
</head>
<body>
